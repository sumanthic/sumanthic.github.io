{{ define "main" }}
<main>
  <h1>{{ .Title }}</h1>

  <p>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 02 2006" }}</time>
    {{ with index .Params.categories 0 }} · {{ . }}{{ end }}
  </p>

  <article>
    {{ .Content }}
  </article>

  <nav>
    {{ with .PrevInSection }}
      <a href="{{ .Permalink }}">← Older: {{ .Title }}</a>
    {{ end }}
    {{ with .NextInSection }}
      <a href="{{ .Permalink }}">Newer: {{ .Title }} →</a>
    {{ end }}
  </nav>
</main>
{{ end }}
